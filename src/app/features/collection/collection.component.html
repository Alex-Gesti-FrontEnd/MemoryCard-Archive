<section class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>
      My Collection <span class="text-muted fs-6">({{ games().length }} games)</span>
    </h2>
    <div>
      <select class="form-select form-select-sm" [(ngModel)]="statusFilter">
        <option value="all">All</option>
        <option value="backlog">Backlog</option>
        <option value="playing">Playing</option>
        <option value="completed">Completed</option>
      </select>
    </div>
  </div>

  <div class="games-grid mt-3">
    <div class="game-card" *ngFor="let game of filteredGames()">
      <span class="game-tag" [ngClass]="'tag-' + game.status">{{ game.status }}</span>
      <img [src]="game.image || 'assets/no-image.png'" class="game-poster" />
      <div class="game-info">
        <h6>{{ game.name }}</h6>
        <p>{{ game.platform }} • {{ game.region }}</p>
        <p>Format: {{ game.format | titlecase }}</p>
        <p>Added: {{ game.created_at | date: 'dd-MM-yyyy' }}</p>
        <button class="btn btn-sm btn-outline-danger mt-1 w-100" (click)="removeGame(game.id)">
          Delete
        </button>
      </div>
    </div>
  </div>
</section>
